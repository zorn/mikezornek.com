{{- /*
  Renders a pill cloud for an ordered taxonomy.

  @context the ordered taxonomy slice (e.g. site.Taxonomies.tags.ByCount or
           a term page's .Data.Terms.ByCount).

  @example: {{ partial "term-pills.html" site.Taxonomies.tags.ByCount }}
*/ -}}
<div class="not-prose flex flex-wrap gap-2">
  {{- range . }}
    <a
      class="inline-block border border-gray-300 bg-white px-2 py-0.5 text-sm text-purple-700 no-underline hover:bg-purple-600 hover:text-white"
      href="{{ .Page.RelPermalink }}"
    >{{ .Page.Title }} <span class="text-gray-400">{{ .Count }}</span></a>
  {{- end }}
</div>
