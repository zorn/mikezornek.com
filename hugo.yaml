baseURL: "https://mikezornek.com"
locale: "en-us"
title: "Mike Zornek"
description: Personal website of Mike Zornek, a developer and teacher from the suburbs of Philadelphia.
theme: "reborn"
params:
  description: Personal website of Mike Zornek, a developer and teacher from the suburbs of Philadelphia.
  fediverse_creator: "@zorn@jawns.club"
  author:
    name: Mike Zornek
    email: mike@mikezornek.com
  # Series listed newest-first (personal logging). Others default to oldest-first
  # so reading-order series (e.g. tutorials) read top-to-bottom.
  seriesNewestFirst:
    - Journals
pagination:
  pagerSize: 20
markup:
  goldmark:
    extensions:
      typographer: true
    renderer:
      unsafe: true
mainSections:
  - posts

# Keep taxonomy term titles as authored (e.g. "ios", "ai") instead of
# auto-capitalizing to "Ios"/"Ai". Section pages set their own titles.
capitalizeListTitles: false

taxonomies:
  tag: tags
  series: series

related:
  includeNewer: true
  threshold: 80
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: series
      weight: 40
    - name: date
      weight: 10
menu:
  main:
    - name: Home
      url: /
      weight: 10
    - name: Blog
      url: /posts/
      weight: 20
    - name: Elixir Consulting
      url: /elixir-consulting/
      weight: 25
    - name: Values
      url: /values/
      weight: 50
    - name: Follow
      url: /follow/
      weight: 55
    - name: Now
      url: /now/
      weight: 59
    - name: Contact
      url: /contact/
      weight: 60
    - name: 🎲
      title: Read a random post
      url: /random/
      weight: 65

outputs:
  home: ["HTML", "RSS", "JSON"]

build:
  buildStats:
    enable: true
  cachebusters:
    - source: assets/notwatching/hugo_stats\.json
      target: css
    - source: (postcss|tailwind)\.config\.js
      target: css
    - source: assets/.*\.(.*)$
      target: $1
module:
  mounts:
    - source: assets
      target: assets
    - disableWatch: true
      source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json
